<template>

    <!-- Loading Spinner -->
    <template if:true={isLoading}>
        <lightning-spinner
            alternative-text="Loading Candidates"
            size="medium">
        </lightning-spinner>
    </template>

    <!-- Dashboard Card -->
    <lightning-card title="Recruitment Dashboard" icon-name="standard:people">

        <!-- Search Section -->
        <div class="slds-p-around_medium">

            <lightning-layout multiple-rows>

                <lightning-layout-item size="9">
                    <lightning-input
                        type="search"
                        label="Search Candidate"
                        value={searchKey}
                        onchange={handleSearchChange}>
                    </lightning-input>
                </lightning-layout-item>

                <lightning-layout-item
                    size="3"
                    class="slds-p-top_large slds-p-left_small">

                    <lightning-button
                        label="Search"
                        variant="brand"
                        onclick={handleSearch}>
                    </lightning-button>

                    <lightning-button
                        label="Clear"
                        class="slds-m-left_small"
                        onclick={handleClearSearch}>
                    </lightning-button>

                </lightning-layout-item>

            </lightning-layout>

            <p class="slds-m-top_small">
                Total Candidates: {candidateCount}
            </p>

        </div>

        <!-- Candidate List -->
        <template if:true={hasCandidates}>

            <template
                for:each={candidates}
                for:item="candidate">

                <lightning-card
                    key={candidate.candidateId}
                    title={candidate.candidateName}
                    icon-name="standard:person_account">

                    <div class="slds-p-horizontal_medium">

                        <p>
                            <strong>Email:</strong>
                            {candidate.email}
                        </p>

                        <p>
                            <strong>Phone:</strong>
                            {candidate.phone}
                        </p>

                        <p>
                            <strong>Skills:</strong>
                            {candidate.skills}
                        </p>

                        <p>
                            <strong>Experience:</strong>
                            {candidate.experience} Years
                        </p>

                        <br/>

                        <h3>
                            <strong>Applications</strong>
                        </h3>

                        <!-- Applications -->
                        <template
                            for:each={candidate.applications}
                            for:item="application">

                            <div
                                key={application.applicationNumber}
                                class="slds-box slds-m-top_small">

                                <p>
                                    <strong>Application:</strong>
                                    {application.applicationNumber}
                                </p>

                                <p>
                                    <strong>Position:</strong>
                                    {application.positionName}
                                </p>

                                <p>
                                    <strong>Status:</strong>
                                    {application.status}
                                </p>

                                <p>
                                    <strong>Applied Date:</strong>
                                    {application.appliedDate}
                                </p>

                            </div>

                        </template>

                    </div>

                </lightning-card>

            </template>

        </template>

        <!-- Empty State -->
        <template if:true={showEmptyState}>

            <div class="slds-p-around_large slds-align_absolute-center">

                <p>No candidates found.</p>

            </div>

        </template>

        <!-- Error -->
        <template if:true={error}>

            <div class="slds-p-around_medium slds-text-color_error">

                Something went wrong while loading candidates.

            </div>

        </template>

    </lightning-card>

</template>
